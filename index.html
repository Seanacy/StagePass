<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>StagePass — Tour. Perform. Get Discovered.</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#e84393" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="StagePass" />
<meta name="description" content="The platform for exotic dancers to build touring schedules across strip clubs nationwide." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />

  "imports": {
    "react": "https://esm.sh/react@18.2.0",

    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0a0f; color: #fff; line-height: 1.6;
}
a { color: #e84393; text-decoration: none; }

:root {
  --primary: #e84393;
  --primary-light: #fd79a8;
  --primary-dark: #c0392b;
  --accent: #f9ca24;
  --accent-dark: #f0932b;
  --bg-dark: #0a0a0f;
  --bg-card: #14141f;
  --bg-card-hover: #1a1a2e;
  --border: #2a2a3e;
  --text: #fff;
  --text-muted: #999;
  --text-dim: #555;
  --success: #00b894;
  --danger: #ff4757;
}

/* Navbar */
.navbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 2rem; border-bottom: 1px solid #222;
  background: #000; backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100;
}
.navbar-brand {
  font-size: 1.4rem; font-weight: 900; color: var(--accent);
  letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.1rem;
}
.navbar-brand .green { color: var(--success); }
.navbar-links { display: flex; gap: 1.25rem; align-items: center; }
.navbar-links a, .navbar-links button {
  color: var(--text-muted); font-size: 0.85rem; font-weight: 500;
  transition: color 0.2s; background: none; border: none; cursor: pointer;
  font-family: inherit;
}
.navbar-links a:hover, .navbar-links button:hover { color: var(--text); }

/* Mobile hamburger */
.hamburger {
  display: none; background: none; border: none; cursor: pointer;
  padding: 4px; color: var(--text-muted); font-size: 1.5rem;
  z-index: 110;
}

/* Buttons */
.btn {
  padding: 0.6rem 1.5rem; border: none; border-radius: 0.5rem;
  font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; box-shadow: 0 4px 15px rgba(232,67,147,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,67,147,0.4); }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #000; font-weight: 700;
}
.btn-sm { padding: 0.4rem 1rem; font-size: 0.8rem; }
.btn-lg { padding: 0.8rem 2rem; font-size: 1rem; }

/* Cards */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 1rem; padding: 1.5rem; transition: all 0.2s;
}
.card:hover { border-color: var(--primary); background: var(--bg-card-hover); }

/* Inputs */
input, textarea, select {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); padding: 0.7rem 1rem; border-radius: 0.5rem;
  font-size: 0.9rem; width: 100%; font-family: inherit; transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.3rem; display: block; }

/* Hero */
.hero {
  text-align: center; padding: 6rem 2rem 5rem;
  background: radial-gradient(ellipse at center top, rgba(232,67,147,0.12) 0%, transparent 60%);
}
.hero h1 { font-size: 3.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 1rem; }
.hero .gradient {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { font-size: 1.15rem; color: var(--text-muted); max-width: 550px; margin: 0 auto 2rem; }

/* Split Hero */
.split-hero {
  display: flex; min-height: calc(100vh - 52px); position: relative;
}
.split-side {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 3rem 2rem; position: relative;
}
.split-left {
  background: radial-gradient(ellipse at 70% 30%, rgba(232,67,147,0.1) 0%, transparent 60%);
}
.split-right {
  background: radial-gradient(ellipse at 30% 30%, rgba(249,202,36,0.08) 0%, transparent 60%);
}
.split-divider {
  position: absolute; left: 50%; top: 0; bottom: 0; width: 1px;
  background: linear-gradient(to bottom, transparent 5%, #2a2a3e 15%, var(--primary) 35%, var(--accent) 65%, #2a2a3e 85%, transparent 95%);
  z-index: 2;
}
.split-label {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 1rem;
}
.split-title {
  font-size: 2rem; font-weight: 900; line-height: 1.15; text-align: center;
  margin-bottom: 0.5rem;
}
.split-subtitle {
  font-size: 0.95rem; color: var(--text-muted); text-align: center;
  margin-bottom: 1.5rem; max-width: 320px;
}
.split-features {
  display: flex; flex-direction: column; gap: 0.6rem; font-size: 0.85rem;
  color: var(--text-muted); margin-bottom: 1.75rem; width: 100%; max-width: 320px;
}
.split-features div { display: flex; align-items: center; gap: 0.5rem; }
.split-stat-row {
  display: flex; gap: 2rem; margin-bottom: 1.5rem;
}
.split-stat { text-align: center; }
.split-stat-num { font-size: 1.4rem; font-weight: 900; }
.split-stat-label { font-size: 0.7rem; color: var(--text-dim); }

/* Tour preview card inside split */
.tour-preview {
  width: 100%; max-width: 300px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 0.75rem;
  padding: 1rem; margin-bottom: 1.5rem;
}
.tour-preview-header {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--primary); margin-bottom: 0.75rem;
}
.tour-preview-stop {
  display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem;
}
.tour-preview-num {
  width: 22px; height: 22px; border-radius: 50%; background: var(--primary);
  color: #fff; font-size: 0.65rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tour-preview-name { font-size: 0.8rem; font-weight: 700; }
.tour-preview-meta { font-size: 0.7rem; color: var(--text-muted); }
.tour-preview-badge {
  padding: 0.1rem 0.4rem; border-radius: 1rem; font-size: 0.6rem; font-weight: 600;
  margin-left: auto; flex-shrink: 0;
}

/* Dancer preview cards inside split */
.dancer-preview-row {
  display: flex; gap: 0.75rem; margin-bottom: 1.5rem; width: 100%; max-width: 320px;
}
.dancer-preview-card {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 0.75rem; overflow: hidden; text-align: center;
}
.dancer-preview-avatar {
  height: 70px; background: var(--bg-card-hover);
  display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
}
.dancer-preview-info { padding: 0.6rem; }
.dancer-preview-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 0.1rem; }
.dancer-preview-loc { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.4rem; }
.dancer-preview-tags { display: flex; gap: 0.3rem; justify-content: center; flex-wrap: wrap; }
.dancer-preview-tag {
  padding: 0.1rem 0.4rem; border-radius: 1rem; font-size: 0.6rem; font-weight: 600;
  background: rgba(249,202,36,0.1); color: var(--accent);
}

/* Responsive split */
@media (max-width: 768px) {
  .split-hero {
    flex-direction: column; min-height: auto;
  }
  .split-divider {
    position: relative; left: auto; top: auto; bottom: auto;
    width: 80%; height: 1px; margin: 0 auto;
    background: linear-gradient(to right, transparent 0%, var(--primary) 25%, var(--accent) 75%, transparent 100%);
  }
  .split-side {
    padding: 2rem 1.25rem;
  }
  .split-title { font-size: 1.5rem; }
  .split-subtitle { font-size: 0.85rem; margin-bottom: 1rem; }
  .tour-preview { max-width: 100%; }
  .dancer-preview-row { max-width: 100%; }
  .split-features { max-width: 100%; }
  .split-stat-row { gap: 1.5rem; }
  .split-stat-num { font-size: 1.2rem; }
  .btn-lg { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
}

/* Section */
.section { max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; }
.section-header { text-align: center; margin-bottom: 2.5rem; }
.section-header h2 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
.section-header p { color: var(--text-muted); }

/* Club Grid */
.club-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem;
}
.club-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 1rem; padding: 1.25rem; transition: all 0.2s;
}
.club-card:hover { border-color: var(--primary); }
.club-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
.club-location { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.club-contact { font-size: 0.8rem; color: var(--text-dim); }
.club-tag {
  display: inline-block; padding: 0.15rem 0.5rem; border-radius: 1rem;
  font-size: 0.7rem; font-weight: 600; background: rgba(232,67,147,0.12);
  color: var(--primary-light); margin-right: 0.3rem;
}

/* Dancer Grid */
.dancer-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem;
}
.dancer-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 1rem; overflow: hidden; transition: all 0.2s;
}
.dancer-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.dancer-avatar {
  width: 100%; height: 200px; background: linear-gradient(135deg, var(--bg-card-hover), var(--bg-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem; color: var(--primary);
}
.dancer-info { padding: 1rem 1.25rem; }
.dancer-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
.dancer-location { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.dancer-socials { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.social-link {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem;
  font-weight: 600; background: rgba(249,202,36,0.1); color: var(--accent);
  transition: background 0.2s;
}
.social-link:hover { background: rgba(249,202,36,0.2); }

/* Tour Builder */
.tour-timeline {
  display: flex; flex-direction: column; gap: 1rem;
}
.tour-stop {
  display: flex; align-items: flex-start; gap: 1rem;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 0.75rem; padding: 1rem 1.25rem;
}
.tour-stop-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--primary); color: #fff; font-weight: 800;
  font-size: 0.8rem; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
}
.tour-stop-info { flex: 1; }
.tour-stop .status-badge {
  padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.7rem;
  font-weight: 600;
}
.status-pending { background: rgba(249,202,36,0.15); color: var(--accent); }
.status-confirmed { background: rgba(0,184,148,0.15); color: var(--success); }
.status-declined { background: rgba(255,71,87,0.15); color: var(--danger); }

/* Dashboard */
.dashboard { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.dashboard h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
.dashboard .subtitle { color: var(--text-muted); margin-bottom: 2rem; }

/* Tabs */
.tab-bar {
  display: flex; gap: 0.25rem; margin-bottom: 2rem;
  border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.tab {
  padding: 0.6rem 1.25rem; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; border: none; background: none; color: var(--text-muted);
  border-bottom: 2px solid transparent; transition: all 0.2s;
  font-family: inherit;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Auth */
.auth-container { max-width: 420px; margin: 4rem auto; padding: 2rem; }
.auth-container h2 { text-align: center; font-size: 1.8rem; margin-bottom: 0.5rem; }
.auth-container .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; }
.form-group { margin-bottom: 1rem; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center;
}
.filter-bar select { width: auto; min-width: 160px; }
.filter-bar input { max-width: 300px; }

/* Footer */
.footer {
  text-align: center; padding: 3rem 2rem; border-top: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.85rem; margin-top: 4rem;
}

/* ─── Carousel ─── */
.carousel-wrapper { position: relative; }
.carousel-viewport {
  width: 100%; aspect-ratio: 3/4; background: var(--bg-card-hover);
  position: relative; overflow: hidden;
}
.carousel-img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.carousel-video {
  width: 100%; height: 100%; object-fit: cover; display: block; background: #000;
}
.carousel-empty {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.5rem;
  color: var(--text-dim); font-size: 0.85rem;
}
.carousel-empty span:first-child { font-size: 2.5rem; }
.carousel-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.6); color: #fff; border: none;
  font-size: 1.2rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center; z-index: 2;
  transition: background 0.2s; backdrop-filter: blur(4px);
}
.carousel-arrow:hover { background: rgba(0,0,0,0.85); }
.carousel-arrow-left { left: 8px; }
.carousel-arrow-right { right: 8px; }
.carousel-dots {
  display: flex; justify-content: center; gap: 6px;
  padding: 8px 0; background: var(--bg-card);
}
.carousel-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.carousel-dot.active { background: var(--primary); transform: scale(1.3); }
.carousel-toggle {
  display: flex; justify-content: center; gap: 4px;
  padding: 6px 8px; background: var(--bg-card);
  border-top: 1px solid var(--border);
}
.toggle-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 1rem; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); font-size: 0.75rem;
  font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.toggle-btn.active {
  background: var(--primary); border-color: var(--primary); color: #fff;
}
.toggle-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

/* ─── Social Icon Tray ─── */
.social-icon-tray {
  display: flex; gap: 0.6rem; margin-top: 0.5rem;
}
.social-icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.06); display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s; border: 1px solid transparent;
}
.social-icon-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: currentColor; transform: scale(1.1);
}

/* ─── Dancer Card — Club + Availability ─── */
.dancer-club {
  display: flex; align-items: center; gap: 4px;
  font-size: 0.78rem; color: var(--text-muted); margin-top: 2px;
}
.dancer-club.clickable {
  color: var(--accent); cursor: pointer; transition: color 0.2s;
}
.dancer-club.clickable:hover { color: var(--primary-light); text-decoration: underline; }

.availability-display {
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
  margin-top: 4px; font-size: 0.72rem;
}
.avail-days { color: var(--success); font-weight: 600; }
.avail-time { color: var(--text-dim); }

/* ─── Club Card Modal ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(4px);
}
.club-detail-card {
  width: 340px; max-width: 90vw; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 1rem;
  overflow: hidden; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-close {
  position: absolute; top: 10px; right: 10px; z-index: 3;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,0.5); color: #fff; border: none;
  font-size: 1rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background 0.2s;
}
.modal-close:hover { background: var(--danger); }
.club-detail-header {
  width: 100%; aspect-ratio: 4/3; position: relative;
  background: linear-gradient(135deg, rgba(249,202,36,0.15), rgba(0,184,148,0.1));
  display: flex; align-items: center; justify-content: center;
}
.club-detail-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(249,202,36,0.1); border: 2px solid rgba(249,202,36,0.3);
  display: flex; align-items: center; justify-content: center;
}
.club-detail-type-badge {
  position: absolute; bottom: 10px; left: 10px;
  padding: 3px 10px; border-radius: 1rem; font-size: 0.7rem;
  font-weight: 700; background: rgba(232,67,147,0.2); color: var(--primary-light);
}
.club-detail-size-badge {
  position: absolute; bottom: 10px; right: 10px;
  padding: 3px 10px; border-radius: 1rem; font-size: 0.7rem;
  font-weight: 700; background: rgba(0,184,148,0.15); color: var(--success);
}
.club-detail-info { padding: 1.25rem; }
.club-detail-name { font-size: 1.15rem; font-weight: 800; margin-bottom: 2px; }
.club-detail-location { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; }
.club-detail-divider {
  height: 1px; background: var(--border); margin-bottom: 0.75rem;
}
.club-detail-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;
}
.club-detail-row svg { flex-shrink: 0; margin-top: 2px; }

/* ─── Day Picker (Dashboard) ─── */
.day-picker {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.day-chip {
  padding: 6px 12px; border-radius: 1rem; font-size: 0.8rem;
  font-weight: 600; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.day-chip.active {
  background: var(--success); border-color: var(--success);
  color: #fff;
}
.day-chip:hover:not(.active) { border-color: var(--success); color: var(--success); }

/* ─── Media Management Grid (Dashboard) ─── */
.media-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0.75rem;
}
.media-thumb {
  position: relative; aspect-ratio: 1; border-radius: 0.5rem;
  overflow: hidden; border: 1px solid var(--border);
}
.media-thumb img, .media-thumb video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.media-thumb .main-badge {
  position: absolute; top: 6px; left: 6px;
  padding: 2px 6px; border-radius: 4px; font-size: 0.6rem;
  font-weight: 700; background: var(--accent); color: #000;
}
.media-thumb-actions {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center; gap: 0.5rem;
  padding: 6px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
  opacity: 0; transition: opacity 0.2s;
}
.media-thumb:hover .media-thumb-actions { opacity: 1; }
.media-thumb-actions button {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 0.8rem;
