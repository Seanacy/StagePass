<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StagePass Admin Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; }
</style>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  var h = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useCallback = React.useCallback;
  var Fragment = React.Fragment;
  var createClient = supabase.createClient;


  function jsx(type, props, key) {
    if (!props) props = {};
    var children = props.children;
    var rest = {};
    for (var k in props) { if (k !== 'children') rest[k] = props[k]; }
    if (key !== undefined) rest.key = key;
    if (children === undefined) return h(type, rest);
    if (Array.isArray(children)) return h.apply(null, [type, rest].concat(children));
    return h(type, rest, children);
  }
  var jsxs = jsx;


  var ADMIN_PASSWORD = '00272213Sr$';


  document.getElementById('root').innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:rgba(255,255,255,0.5)">Loading admin...</div>';


  fetch('/admin.js?v=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(code) {
      code = code.replace(/^import\s+.+$/gm, '');
      code = code.replace(/^export\s+function/gm, 'function');
      code = code.replace(/.*createRoot.*/g, '');


      var fn = new Function(
        'React', 'useState', 'useEffect', 'useCallback',
        'Fragment', 'jsx', 'jsxs', 'createClient',
        code + '\nreturn { AdminPanel: AdminPanel, SUPABASE_URL: SUPABASE_URL, SUPABASE_ANON_KEY: SUPABASE_ANON_KEY, ADMIN_EMAIL: ADMIN_EMAIL };'
      );


      var result = fn(React, useState, useEffect, useCallback, Fragment, jsx, jsxs, createClient);
      var AdminPanel = result.AdminPanel;
      var ADMIN_EMAIL = result.ADMIN_EMAIL;


      function App() {
        var s1 = useState(null); var user = s1[0]; var setUser = s1[1];
        var s2 = useState(''); var password = s2[0]; var setPassword = s2[1];
        var s3 = useState(''); var error = s3[0]; var setError = s3[1];


        function handleLogin() {
          if (password === ADMIN_PASSWORD) {
            setUser({ email: ADMIN_EMAIL });
            setError('');
          } else {
            setError('Incorrect password');
          }
        }


        if (!user) {
          return jsx('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh' },
            children: jsx('div', { style: { background: '#1e293b', padding: '2rem', borderRadius: '12px', width: '360px', textAlign: 'center' },
              children: jsxs('div', { children: [
                jsx('h1', { style: { fontSize: '1.5rem', marginBottom: '0.5rem', color: '#e84393' }, children: 'StagePass Admin' }),
                jsx('p', { style: { color: 'rgba(255,255,255,0.6)', marginBottom: '1.5rem' }, children: 'Enter admin password' }),
                error ? jsx('div', { style: { padding: '0.6rem', background: 'rgba(239,68,68,0.15)', color: '#ef4444', borderRadius: '8px', fontSize: '0.85rem', marginBottom: '1rem' }, children: error }) : null,
                jsx('input', { type: 'password', value: password, onChange: function(e) { setPassword(e.target.value); }, placeholder: 'Password', style: { width: '100%', padding: '0.75rem', borderRadius: '8px', border: '1px solid rgba(255,255,255,0.2)', background: 'rgba(255,255,255,0.05)', color: '#fff', marginBottom: '1rem', fontSize: '1rem', outline: 'none' }, onKeyDown: function(e) { if (e.key === 'Enter') handleLogin(); } }),
                jsx('button', { onClick: handleLogin, style: { width: '100%', padding: '0.75rem', borderRadius: '8px', border: 'none', background: '#e84393', color: '#fff', fontSize: '1rem', cursor: 'pointer', fontWeight: 600 }, children: 'Sign In' })
              ] })
            })
          });
        }


        return jsx(AdminPanel, { user: user, onClose: function() { setUser(null); } });
      }


      ReactDOM.createRoot(document.getElementById('root')).render(jsx(App, {}));
    })
    .catch(function(err) {
      document.getElementById('root').innerHTML = '<div style="color:red;padding:2rem">Error loading admin: ' + err.message + '</div>';
    });
})();
</script>
</body>
</html>
